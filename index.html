<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Florian Dierckx — Web Portfolio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 700px;
            text-align: center;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 700;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #00d4ff, #0099ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            font-size: 1.2rem;
            color: #999;
            margin-bottom: 50px;
            font-weight: 400;
        }

        .projects {
            display: grid;
            gap: 20px;
            margin-bottom: 50px;
        }

        .project {
            display: grid;
            gap: 10px;
        }

        .project-label {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #00d4ff;
            font-weight: 600;
        }

        a {
            display: block;
            padding: 18px 30px;
            background: linear-gradient(135deg, #0066cc, #0052a3);
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 1.1rem;
            transition: all 0.3s ease;
            border: 2px solid transparent;
            cursor: pointer;
        }

        a:hover {
            background: linear-gradient(135deg, #0052a3, #003d7a);
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0, 102, 204, 0.3);
            border-color: #00d4ff;
        }

        .links {
            margin-top: 50px;
            padding-top: 40px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .links a {
            display: inline-block;
            padding: 10px 20px;
            margin: 0 10px;
            background: transparent;
            border: 1px solid #00d4ff;
            color: #00d4ff;
            font-size: 0.95rem;
        }

        .links a:hover {
            background: rgba(0, 212, 255, 0.1);
            border-color: #00d4ff;
        }

        .footer {
            margin-top: 60px;
            font-size: 0.9rem;
            color: #666;
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 2.5rem;
            }

            .subtitle {
                font-size: 1rem;
            }

            a {
                padding: 15px 25px;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Florian Dierckx</h1>
        <p class="subtitle">Web Design & AI Automation</p>

        <div class="projects">
            <div class="project">
                <div class="project-label">BEVAC Engineering — V2</div>
                <a href="./bevac-v2/">Sober • Technical • Enterprise</a>
            </div>

            <div class="project">
                <div class="project-label">BEVAC Engineering — V3</div>
                <a href="./bevac-v3/">Modern • Animations • Premium</a>
            </div>

            <div class="project">
                <div class="project-label">Angry Dollz</div>
                <a href="./angry-dollz/">E-Commerce • Y2K Aesthetic</a>
            </div>
        </div>

        <div class="links">
            <a href="https://linkedin.com/in/florian-dierckx" target="_blank">LinkedIn</a>
            <a href="mailto:dierckx.florian@gmail.com">Email</a>
        </div>

        <div class="footer">
            <p>Building web experiences & GTM automation workflows</p>
        </div>
    </div>
</body>
</html>
